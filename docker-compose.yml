version: "3.8"

services:
  # ─────────────────────────────────────────────
  # Reverse Proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./certs:/etc/nginx/certs:ro
    environment:
      - NGINX_HOST=${NGINX_HOST}
    depends_on:
      - kasm_proxy
      - outline
    networks:
      - proxy
      - kasm_default_network

  # ─────────────────────────────────────────────
  # Kasm Workspaces (multi-service stack)
  # ─────────────────────────────────────────────

  # Downloads the Kasm release and runs the installer with --no-start to
  # generate all configs, certs, and SQL under /opt/kasm/1.18.1/.
  # Exits 0 immediately on subsequent starts (idempotent).
  kasm_init:
    build:
      context: ./kasm
      args:
        KASM_VERSION: "1.18.1"
    container_name: kasm_init
    restart: "no"
    privileged: true
    environment:
      KASM_VERSION: "1.18.1"
      KASM_DB_PASSWORD: ${KASM_DB_PASSWORD}
    volumes:
      - /opt/kasm:/opt/kasm
      - /var/run/docker.sock:/var/run/docker.sock

  kasm_db:
    container_name: kasm_db
    image: kasmweb/postgres:1.18.1
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 60s
    healthcheck:
      test: "pg_isready --username=$$POSTGRES_USER --dbname=$$POSTGRES_DB && cat /proc/1/cmdline | grep -q '^postgres'"
      timeout: 5s
      retries: 20
    depends_on:
      kasm_init:
        condition: service_completed_successfully
    environment:
      POSTGRES_PASSWORD: ${KASM_DB_PASSWORD}
      POSTGRES_USER: kasmapp
      POSTGRES_DB: kasm
    volumes:
      - /opt/kasm/1.18.1/conf/database/data.sql:/docker-entrypoint-initdb.d/data.sql
      - /opt/kasm/1.18.1/conf/database/pg_hba.conf:/var/lib/postgresql/conf/pg_hba.conf
      - /opt/kasm/1.18.1/conf/database/postgresql.conf:/var/lib/postgresql/conf/postgresql.conf
      - /opt/kasm/1.18.1/certs/db_server.crt:/etc/ssl/certs/db_server.crt
      - /opt/kasm/1.18.1/certs/db_server.key:/etc/ssl/certs/db_server.key
      - /opt/kasm/1.18.1/log/postgres/:/var/log/postgres/
      - /opt/kasm/1.18.1/tmp/kasm_db/:/tmp/
      - kasm_db_data:/var/lib/postgresql/data
    command: >-
      postgres
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/db_server.crt
      -c ssl_key_file=/etc/ssl/certs/db_server.key
      -c config_file=/var/lib/postgresql/conf/postgresql.conf
      -c hba_file=/var/lib/postgresql/conf/pg_hba.conf
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network

  kasm_api:
    container_name: kasm_api
    image: kasmweb/api:1.18.1
    restart: unless-stopped
    user: "${KASM_UID}:${KASM_GID}"
    read_only: true
    healthcheck:
      test: "/usr/bin/healthcheck.sh http://localhost:8080/api/__healthcheck \"\" 5 60"
      timeout: 30s
      interval: 10s
      retries: 3
    depends_on:
      kasm_db:
        condition: service_healthy
    volumes:
      - /opt/kasm/1.18.1:/opt/kasm/current
      - /opt/kasm/1.18.1/tmp/api:/tmp
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network

  kasm_manager:
    container_name: kasm_manager
    image: kasmweb/manager:1.18.1
    restart: unless-stopped
    user: "${KASM_UID}:${KASM_GID}"
    read_only: true
    healthcheck:
      test: "/usr/bin/healthcheck.sh http://localhost:8181/__healthcheck \"\" 5 60"
      timeout: 30s
      interval: 10s
      retries: 3
    depends_on:
      kasm_db:
        condition: service_healthy
    volumes:
      - /opt/kasm/1.18.1:/opt/kasm/current
      - /opt/kasm/1.18.1/tmp/manager:/tmp
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network

  kasm_agent:
    container_name: kasm_agent
    image: kasmweb/agent:1.18.1
    restart: unless-stopped
    user: root
    read_only: true
    healthcheck:
      test: "/usr/bin/healthcheck.sh http://localhost:4444/__healthcheck \"\" 30 90 15"
      timeout: 30s
      interval: 30s
      retries: 3
    depends_on:
      - kasm_manager
    volumes:
      - /opt/kasm/1.18.1:/opt/kasm/current
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/kasm/1.18.1/conf/nginx:/etc/nginx/conf.d
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network

  kasm_guac:
    container_name: kasm_guac
    image: kasmweb/kasm-guac:1.18.1
    restart: unless-stopped
    user: "${KASM_UID}:${KASM_GID}"
    read_only: true
    init: true
    healthcheck:
      test: "/usr/bin/healthcheck.sh http://localhost:3000/__healthcheck \"\" 30 90"
      interval: 60s
      timeout: 30s
      retries: 3
    volumes:
      - /opt/kasm/1.18.1/log:/opt/kasm/current/log
      - /opt/kasm/1.18.1/tmp/guac:/opt/kasm/current/tmp/guac
      - /opt/kasm/1.18.1/conf/app/guac:/opt/kasm/current/conf/app/guac
      - /opt/kasm/1.18.1/tmp/guac:/tmp
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network

  kasm_rdp_gateway:
    container_name: kasm_rdp_gateway
    image: kasmweb/rdp-gateway:1.18.1
    restart: unless-stopped
    user: "${KASM_UID}:${KASM_GID}"
    read_only: true
    depends_on:
      - kasm_api
    ports:
      - "3389:3389"
    healthcheck:
      test: "/usr/bin/healthcheck.sh http://localhost:5555/__healthcheck 3389 1 30"
      interval: 60s
      timeout: 30s
      start_period: 30s
    volumes:
      - /opt/kasm/1.18.1/log:/opt/kasm/current/log
      - /opt/kasm/1.18.1/conf/app/rdp_gateway:/usr/local/etc/rdpproxy/conf
      - /opt/kasm/1.18.1/certs/kasm_nginx.key:/usr/local/etc/rdpproxy/rdpproxy.key
      - /opt/kasm/1.18.1/certs/kasm_nginx.crt:/usr/local/etc/rdpproxy/rdpproxy.crt
      - /opt/kasm/1.18.1/tmp/rdpgw/var:/usr/local/etc/rdpproxy/var
      - /opt/kasm/1.18.1/tmp/rdpgw/tmp:/tmp
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network

  kasm_rdp_https_gateway:
    container_name: kasm_rdp_https_gateway
    image: kasmweb/rdp-https-gateway:1.18.1
    restart: unless-stopped
    user: "${KASM_UID}:${KASM_GID}"
    read_only: true
    depends_on:
      - kasm_rdp_gateway
    healthcheck:
      test: "/usr/bin/healthcheck.sh https://localhost:9443/rdp-https-gateway/__healthcheck \"\" 1 30"
      interval: 60s
      timeout: 30s
      start_period: 30s
    volumes:
      - /opt/kasm/1.18.1/log:/opt/kasm/current/log
      - /opt/kasm/1.18.1/conf/app/rdp_https_gateway:/opt/rdpgw/conf/
      - /opt/kasm/1.18.1/certs/kasm_nginx.key:/opt/rdpgw/key.pem
      - /opt/kasm/1.18.1/certs/kasm_nginx.crt:/opt/rdpgw/server.pem
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network

  kasm_proxy:
    container_name: kasm_proxy
    image: kasmweb/proxy:1.18.1
    restart: unless-stopped
    # Port 443 is NOT exposed publicly — our nginx owns that.
    # nginx reaches this container via the shared proxy network.
    depends_on:
      - kasm_manager
      - kasm_api
      - kasm_agent
      - kasm_guac
      - kasm_rdp_https_gateway
    volumes:
      - /opt/kasm/1.18.1/conf/nginx:/etc/nginx/conf.d:ro
      - /opt/kasm/1.18.1/certs/kasm_nginx.key:/etc/ssl/private/kasm_nginx.key
      - /opt/kasm/1.18.1/certs/kasm_nginx.crt:/etc/ssl/certs/kasm_nginx.crt
      - /opt/kasm/1.18.1/log/nginx:/var/log/external/nginx/
      - /opt/kasm/1.18.1/log/logrotate:/var/log/external/logrotate/
    logging:
      driver: json-file
      options: {max-size: 10m, max-file: "20"}
    networks:
      - kasm_default_network
      - proxy

  # ─────────────────────────────────────────────
  # Outline (Wiki)
  # ─────────────────────────────────────────────
  outline:
    image: outlinewiki/outline:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      URL: https://outline.${NGINX_HOST}
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - proxy

  # ─────────────────────────────────────────────
  # PostgreSQL (for Outline)
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - proxy

  # ─────────────────────────────────────────────
  # Redis (for Outline)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - proxy

networks:
  proxy:
    driver: bridge
  kasm_default_network:
    driver: bridge

volumes:
  kasm_db_data:
  postgres_data:
  redis_data:
